<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Verificación de acceso - Sentinel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --bg-card: #080808;
      --border: #1f1f1f;
      --text: #ffffff;
      --text-muted: #888888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    .container { width: 100%; max-width: 480px; text-align: center; }
    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; line-height: 1.1; }
    .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 40px; }
    
    .card { background: var(--bg-card); border: 1px solid var(--border); padding: 48px; text-align: left; }
    .label { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    
    .pin-input {
      width: 100%; height: 64px; background: var(--bg); border: 1px solid var(--border);
      color: #fff; font-size: 2rem; text-align: center; letter-spacing: 0.5em; margin-bottom: 32px;
      font-family: monospace; outline: none; transition: 0.2s;
    }
    .pin-input:focus { border-color: #555; }

    .btn {
      width: 100%; background: #666; color: #000; border: none; padding: 16px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 24px;
    }
    .btn:hover { background: #888; }
    
    .btn-text {
      width: 100%; background: transparent; color: var(--text-muted); border: none; font-size: 0.7rem;
      font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; transition: 0.2s;
    }
    .btn-text:hover { color: #fff; }

    .footer-text { margin-top: 32px; font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-bottom: 32px; }
    
    .error { color: #ef4444; font-size: 0.75rem; text-align: center; margin-top: -16px; margin-bottom: 16px; display: none; }
  </style>
</head>

<body>
  <div class="container">
    <div style="margin-bottom: 40px;">
      <img src="logo.png" alt="Sentinel Logo" style="height: 48px; object-fit: contain;">
    </div>
    <h1>Verificación de<br>acceso</h1>
    <div class="subtitle">Ingrese el código de verificación enviado a su correo</div>
    
    <div class="card">
      <div class="label">CÓDIGO DE VERIFICACIÓN</div>
      <form id="loginForm" onsubmit="event.preventDefault(); attemptLogin();">
        <!-- Uso de tipo password para replicar visualmente los puntos oscuros de la captura -->
        <input type="password" id="pinCode" class="pin-input" maxlength="6" autofocus autocomplete="off">
        <div id="errorMsg" class="error">Código inválido.</div>
        <button type="submit" class="btn">Verificar acceso</button>
      </form>
      <button class="btn-text" onclick="alert('Funcionalidad simulada para la demo.')">SOLICITAR NUEVO CÓDIGO</button>
    </div>

    <div class="footer-text">El código es válido por tiempo limitado y solo puede utilizarse una vez.</div>
    <button class="btn-text" onclick="window.history.back()">VOLVER AL INICIO</button>
  </div>

  <script>
    async function attemptLogin() {
      const pin = document.getElementById('pinCode').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: pin })
        });
        
        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('waf_token', data.token);
          window.location.href = 'index.html';
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (e) {
        errorMsg.textContent = 'Error de conexión al servidor.';
        errorMsg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
